# 工作流名称：核心文件存在性验证（CI/CD 实践）
name: Core File Validation CI

# 触发条件：推送到 main 或提交 PR 到 main
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  validate-core-files:
    # 运行环境：最新 Ubuntu
    runs-on: ubuntu-latest
    steps:
      # 步骤1：拉取代码（CI 必备步骤）
      - name: Checkout code
        uses: actions/checkout@v4

      # 步骤2：核心自动化测试——验证关键文件存在
      - name: Run core validation test
        run: |
          echo "🔍 开始执行自动化测试：验证核心文件是否存在"
          # 定义需要检查的核心文件列表
          REQUIRED_FILES=("README.md" "Contributors.md" "LICENSE")
          FAILED=0

          for FILE in "${REQUIRED_FILES[@]}"; do
            if [ -f "$FILE" ]; then
              echo "✅ 测试通过：$FILE 存在"
            else
              echo "❌ 测试失败：$FILE 缺失"
              FAILED=1
            fi
          done

          # 根据检查结果退出，0=成功，1=失败
          if [ $FAILED -eq 0 ]; then
            echo "🎉 所有核心自动化测试通过！"
            exit 0
          else
            echo "❌ 核心自动化测试失败！"
            exit 1
          fi
